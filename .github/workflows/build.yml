name: Build HTML to APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Unzip Project
      run: |
        unzip fastdown.zip -d web-app
        mv web-app/* ./ || true

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Capacitor
      run: |
        npm install @capacitor/core @capacitor/cli
        npx cap init "FastDown Pro" "com.fastdown.pro" --web-dir=.
        npm install @capacitor/android
        npx cap add android

    - name: Sync Code to Android
      run: npx cap sync

    - name: Build Release APK
      run: |
        cd android
        ./gradlew assembleRelease

    - name: Upload Professional APK
      uses: actions/upload-artifact@v4
      with:
        name: FastDownPro-Release-APK
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
        
